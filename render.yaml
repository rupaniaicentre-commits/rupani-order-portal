services:
  - type: web
    name: rupani-order-portal
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: ORDER_EMAIL
        sync: false
      - key: GSHEET_ID
        sync: false
